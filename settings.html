<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TypoSwitch Settings</title>
</head>
<body>
  <h2>TypoSwitch Settings</h2>

  <label>
    <input type="checkbox" id="autoFix">
    Enable auto fix (future feature)
  </label>

  <br><br>

  <label>
    <input type="checkbox" id="showToast" checked>
    Show toast after fix
  </label>

  <br><br>

  <button id="saveBtn">Save</button>

  <script src="settings.js"></script>
</body>
</html>
